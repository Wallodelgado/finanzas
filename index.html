<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas 2026 - Portfolio Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); }
        .line-chart-svg { overflow: visible; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .progress-bar-bg { background: rgba(30, 41, 59, 0.5); }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const CryptoLogo = ({ src, symbol, className = "w-8 h-8 rounded-full" }) => {
            const [error, setError] = useState(!src);
            useEffect(() => { setError(!src); }, [src]);
            
            if (error || !src) {
                const colors = ['bg-indigo-600', 'bg-fuchsia-600', 'bg-blue-600', 'bg-emerald-600', 'bg-amber-500', 'bg-rose-500'];
                const bgColor = colors[symbol?.length % colors.length] || 'bg-indigo-600';
                return (
                    <div className={`${className} ${bgColor} flex items-center justify-center text-[10px] font-bold text-white uppercase`}>
                        {symbol?.[0] || '?'}
                    </div>
                );
            }
            return <img src={src} className={className} alt={symbol} onError={() => setError(true)} />;
        };

        const MiniLineChart = ({ data, color }) => {
            if (!data || data.length < 2) return null;
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const width = 100;
            const height = 40;
            const points = data.map((val, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((val - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');
            return (
                <svg viewBox={`0 0 ${width} ${height}`} className="line-chart-svg w-full h-10">
                    <polyline fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" points={points} />
                </svg>
            );
        };

        const DistributionChart = ({ data }) => {
            const total = data.reduce((acc, item) => acc + item.value, 0);
            if (total === 0) return (
                <div className="flex flex-col items-center justify-center h-64 text-slate-500">
                    <Icon name="pie-chart" size={48} className="mb-4 opacity-20" />
                    <p className="font-bold uppercase tracking-widest text-xs">Sin datos de activos</p>
                </div>
            );

            let cumulativePercent = 0;
            const getCoordinatesForPercent = (percent) => {
                const x = Math.cos(2 * Math.PI * percent);
                const y = Math.sin(2 * Math.PI * percent);
                return [x, y];
            };

            const slices = data.map((slice, i) => {
                const startPercent = cumulativePercent;
                const slicePercent = slice.value / total;
                cumulativePercent += slicePercent;
                const [startX, startY] = getCoordinatesForPercent(startPercent);
                const [endX, endY] = getCoordinatesForPercent(cumulativePercent);
                const largeArcFlag = slicePercent > 0.5 ? 1 : 0;
                const pathData = [
                    `M ${startX} ${startY}`,
                    `A 1 1 0 ${largeArcFlag} 1 ${endX} ${endY}`,
                    `L 0 0`,
                ].join(' ');
                return <path key={i} d={pathData} fill={slice.color} stroke="#0f172a" strokeWidth="0.01" className="hover:opacity-80 transition-opacity cursor-pointer" />;
            });

            return (
                <div className="flex flex-col md:flex-row items-center gap-16">
                    <div className="relative w-72 h-72 md:w-96 md:h-96">
                        <svg viewBox="-1 -1 2 2" className="transform -rotate-90 w-full h-full drop-shadow-2xl">
                            {slices}
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <div className="w-40 h-40 md:w-48 md:h-48 bg-slate-950 rounded-full flex flex-center items-center justify-center border border-slate-800 shadow-inner">
                                <Icon name="coins" size={48} className="text-indigo-500 opacity-50" />
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 space-y-4 w-full">
                        {data.map((item, i) => (
                            <div key={i} className="flex items-center justify-between p-4 rounded-[2rem] bg-slate-900/50 border border-slate-800/50 hover:bg-slate-800/50 transition-colors group">
                                <div className="flex items-center gap-5">
                                    <div className="w-5 h-5 rounded-full border-2 border-slate-700 shadow-sm" style={{ backgroundColor: item.color }}></div>
                                    <span className="font-bold text-lg md:text-xl text-slate-200 group-hover:text-white transition-colors">{item.label}</span>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-xl md:text-2xl text-white tracking-tight">${item.value.toLocaleString('en-US', {maximumFractionDigits: 0})}</p>
                                    <p className="text-sm text-indigo-400 font-black uppercase tracking-widest mt-0.5">
                                        {((item.value / total) * 100).toFixed(1)}%
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const LpCard = ({ lp, onUpdate }) => {
            return (
                <div className="bg-slate-900/50 border border-slate-800 p-8 rounded-[3rem] hover:border-indigo-500/30 transition-all group shadow-xl">
                    <div className="flex justify-between items-start mb-8">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center border border-slate-700 bg-slate-950" style={{ color: lp.chainColor }}>
                                <Icon name="database" size={28} />
                            </div>
                            <div>
                                <h3 className="text-xl font-black text-white">{lp.name}</h3>
                                <p className="text-[10px] font-black uppercase tracking-widest" style={{ color: lp.chainColor }}>{lp.chain}</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-1">APR Diario</p>
                            <div className="text-emerald-400 font-black text-lg">
                                +{(lp.apr / 365).toFixed(2)}%
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-6">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Valor Total (USD)</label>
                            <div className="relative">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xl">$</span>
                                <input 
                                    type="number" 
                                    value={lp.value || ''} 
                                    onChange={(e) => onUpdate(lp.id, 'value', e.target.value)}
                                    className="w-full bg-slate-950 border border-slate-800 rounded-2xl pl-10 pr-4 py-4 text-white font-black text-2xl focus:outline-none focus:border-indigo-500 transition-colors"
                                    placeholder="0.00"
                                />
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">APR Anual (%)</label>
                            <div className="relative">
                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xl">%</span>
                                <input 
                                    type="number" 
                                    value={lp.apr || ''} 
                                    onChange={(e) => onUpdate(lp.id, 'apr', e.target.value)}
                                    className="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-4 text-white font-black text-2xl focus:outline-none focus:border-indigo-500 transition-colors text-right"
                                    placeholder="0.00"
                                />
                            </div>
                        </div>
                    </div>
                    
                    <div className="mt-8 pt-6 border-t border-slate-800/50 flex justify-between items-center text-xs">
                        <span className="text-slate-500 font-bold uppercase tracking-widest italic">Retorno Estimado</span>
                        <span className="text-white font-black">
                            ${((parseFloat(lp.value) || 0) * (parseFloat(lp.apr) || 0) / 100 / 365).toFixed(2)} / día
                        </span>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('portfolio');
            const [cryptos, setCryptos] = useState([]);
            const fileInputRef = useRef(null);
            
            const loadData = (key, defaultValue) => {
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : defaultValue;
            };

            const [lps, setLps] = useState(() => loadData('finanzas_lps_v2', {
                stables: [
                    { id: 'frxusd-usdt', name: 'frxUSD-USDT', chain: 'BNB CHAIN', value: 0, apr: 0, chainColor: '#f3ba2f' },
                    { id: 'msusd-usdc', name: 'msUSD-USDC', chain: 'BASE', value: 0, apr: 0, chainColor: '#0052ff' }
                ],
                flujo: [
                    { id: 'mon-usdc', name: 'MON-USDC', chain: 'MONAD', value: 0, apr: 0, chainColor: '#836efd' },
                    { id: 'weth-usdc-monad', name: 'WETH-USDC', chain: 'MONAD', value: 0, apr: 0, chainColor: '#836efd' },
                    { id: 'weth-usdt0-plasma', name: 'WETH-USDT0', chain: 'PLASMA', value: 0, apr: 0, chainColor: '#63e6be' },
                    { id: 'okb-usdt-xlayer', name: 'OKB-USDT', chain: 'XLAYER', value: 0, apr: 0, chainColor: '#ffffff' },
                    { id: 'okb-usdt0-xlayer', name: 'OKB-USDT0', chain: 'XLAYER', value: 0, apr: 0, chainColor: '#ffffff' }
                ],
                reserva: [
                    { id: 'weth-usdc-base', name: 'WETH-USDC', chain: 'BASE', value: 0, apr: 0, chainColor: '#0052ff' }
                ]
            }));

            const [holdings, setHoldings] = useState(() => loadData('finanzas_holdings', {
                'bitcoin': '0', 'ethereum': '0', 'solana': '0', 'binancecoin': '0',
                'bittensor': '0', 'hyperliquid': '0', 'okb': '0',
                'monad': '0', 'pax-gold': '0', 'usd-coin': '0', 'tether': '0'
            }));
            
            const [goals, setGoals] = useState(() => loadData('finanzas_goals', {
                'okb': 30, 'binancecoin': 5, 'solana': 30, 'hyperliquid': 35, 'bittensor': 10
            }));

            const [performanceData, setPerformanceData] = useState(() => loadData('finanzas_performance', []));

            useEffect(() => { localStorage.setItem('finanzas_lps_v2', JSON.stringify(lps)); }, [lps]);
            useEffect(() => { localStorage.setItem('finanzas_holdings', JSON.stringify(holdings)); }, [holdings]);
            useEffect(() => { localStorage.setItem('finanzas_goals', JSON.stringify(goals)); }, [goals]);
            useEffect(() => { localStorage.setItem('finanzas_performance', JSON.stringify(performanceData)); }, [performanceData]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [lastUpdate, setLastUpdate] = useState(null);

            const cryptoIds = 'bitcoin,ethereum,solana,binancecoin,bittensor,okb,pax-gold,usd-coin,tether,hyperliquid,monad';
            const featuredIds = ['bitcoin', 'ethereum', 'okb', 'monad'];
            const tableOrderIds = ['bitcoin', 'solana', 'binancecoin', 'bittensor', 'hyperliquid', 'okb', 'pax-gold', 'usd-coin', 'tether'];

            const fetchPrices = useCallback(async () => {
                try {
                    setLoading(true);
                    const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${cryptoIds}&order=market_cap_desc&sparkline=true&price_change_percentage=24h`;
                    const response = await fetch(url);
                    const data = await response.json();
                    const formattedData = data.map(coin => ({
                        id: coin.id,
                        symbol: coin.symbol.toUpperCase(),
                        name: coin.name,
                        price: coin.current_price,
                        change: coin.price_change_percentage_24h || 0,
                        image: coin.image,
                        history: coin.sparkline_in_7d?.price?.slice(-20) || []
                    }));
                    if (!formattedData.find(c => c.id === 'monad')) {
                        formattedData.push({ id: 'monad', symbol: 'MON', name: 'Monad', price: 4.152, change: 5.24, image: null, history: [3.9, 4.0, 4.1, 4.05, 4.152] });
                    }
                    setCryptos(formattedData);
                    setLastUpdate(new Date().toLocaleTimeString());
                } catch (err) { console.error(err); } finally { setLoading(false); }
            }, []);

            useEffect(() => { fetchPrices(); }, [fetchPrices]);

            const exportData = () => {
                const fullData = {
                    lps,
                    holdings,
                    goals,
                    performanceData,
                    exportedAt: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(fullData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `finanzas-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (imported.lps) setLps(imported.lps);
                        if (imported.holdings) setHoldings(imported.holdings);
                        if (imported.goals) setGoals(imported.goals);
                        if (imported.performanceData) setPerformanceData(imported.performanceData);
                        // Limpiar input
                        e.target.value = null;
                    } catch (err) {
                        console.error("Error al importar", err);
                    }
                };
                reader.readAsText(file);
            };

            const formatCurrency = (val) => {
                if (val >= 1000) return Math.round(val).toLocaleString('en-US');
                if (val >= 1) return val.toLocaleString('en-US', { minimumFractionDigits: 2 });
                return val.toLocaleString('en-US', { minimumFractionDigits: 4 });
            };

            const totalValue = useMemo(() => {
                const cryptoTotal = cryptos.reduce((acc, c) => acc + ((parseFloat(holdings[c.id]) || 0) * c.price), 0);
                const lpStables = lps.stables.reduce((acc, lp) => acc + (parseFloat(lp.value) || 0), 0);
                const lpFlujo = lps.flujo.reduce((acc, lp) => acc + (parseFloat(lp.value) || 0), 0);
                const lpReserva = lps.reserva.reduce((acc, lp) => acc + (parseFloat(lp.value) || 0), 0);
                return cryptoTotal + lpStables + lpFlujo + lpReserva;
            }, [cryptos, holdings, lps]);

            const chartData = useMemo(() => {
                const cryptoColors = {
                    'bitcoin': '#f7931a', 'okb': '#000000', 'hyperliquid': '#63e6be', 'bittensor': '#ffffff',
                    'usd-coin': '#2775ca', 'tether': '#26a17b', 'pax-gold': '#fff5d6', 'binancecoin': '#f3ba2f',
                    'solana': '#8c44f7', 'ethereum': '#627eea', 'monad': '#836efd'
                };
                return cryptos
                    .map(c => ({ label: c.name, value: (parseFloat(holdings[c.id]) || 0) * c.price, color: cryptoColors[c.id] || '#4f46e5' }))
                    .filter(i => i.value > 0)
                    .sort((a,b) => b.value - a.value);
            }, [cryptos, holdings]);

            const updateLp = (section, id, field, val) => {
                setLps(prev => ({ ...prev, [section]: prev[section].map(lp => lp.id === id ? { ...lp, [field]: val } : lp) }));
            };

            const addPerformanceRecord = (date, value) => {
                const newRecord = { date, value: parseFloat(value) || 0 };
                const updated = [...performanceData, newRecord].sort((a,b) => new Date(a.date) - new Date(b.date));
                setPerformanceData(updated);
            };

            const removePerformanceRecord = (index) => {
                setPerformanceData(performanceData.filter((_, i) => i !== index));
            };

            return (
                <div className="min-h-screen flex">
                    <aside className="w-20 md:w-64 border-r border-slate-800 glass flex flex-col py-8 px-4 hidden sm:flex fixed h-full z-30">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <Icon name="wallet" size={24} className="text-white" />
                            </div>
                            <span className="text-xl font-bold hidden md:block tracking-tighter italic text-white uppercase">Finanzas 2026</span>
                        </div>
                        
                        <nav className="space-y-2 flex-1">
                            {['portfolio', 'chart', 'lps', 'performance'].map(v => (
                                <div key={v} onClick={() => setView(v)} className={`flex items-center gap-4 px-4 py-3 rounded-xl cursor-pointer transition-all ${view === v ? 'bg-indigo-600/10 text-indigo-400 border border-indigo-500/20' : 'text-slate-400 hover:text-white'}`}>
                                    <Icon name={v === 'portfolio' ? 'pie-chart' : v === 'chart' ? 'bar-chart-3' : v === 'lps' ? 'layers' : 'trending-up'} />
                                    <span className="font-bold hidden md:block capitalize">{v === 'lps' ? "LP's" : v === 'performance' ? "Rendimiento" : v}</span>
                                </div>
                            ))}
                        </nav>

                        <div className="pt-6 border-t border-slate-800 space-y-4">
                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest px-4">Datos locales</p>
                            <button 
                                onClick={exportData}
                                className="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-emerald-400 hover:bg-emerald-500/5 transition-all group"
                                title="Exportar JSON"
                            >
                                <Icon name="download" className="group-hover:scale-110 transition-transform" />
                                <span className="font-bold hidden md:block text-sm">Backup JSON</span>
                            </button>
                            <label className="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-amber-400 hover:bg-amber-500/5 cursor-pointer transition-all group" title="Importar JSON">
                                <Icon name="upload" className="group-hover:scale-110 transition-transform" />
                                <span className="font-bold hidden md:block text-sm">Cargar Backup</span>
                                <input type="file" accept=".json" onChange={importData} className="hidden" />
                            </label>
                            <div className="text-[9px] font-black text-slate-700 uppercase tracking-widest text-center pt-2">v2.5 Sync Ready</div>
                        </div>
                    </aside>

                    <main className="flex-1 sm:ml-20 md:ml-64 p-6 md:p-10">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                            <div>
                                <h1 className="text-4xl font-black text-white mb-2 italic uppercase tracking-tighter">
                                    {view === 'portfolio' ? 'Portafolio' : view === 'chart' ? 'Distribución' : view === 'lps' ? "Liquidity Pools" : "Rendimiento"}
                                </h1>
                                <p className="text-slate-400 text-xs flex items-center gap-2">
                                    <Icon name="refresh-cw" size={12} className={loading ? "animate-spin" : ""} />
                                    {loading ? "Sincronizando..." : `Última actualización: ${lastUpdate}`}
                                </p>
                            </div>
                            <div className="glass border border-indigo-500/30 px-8 py-4 rounded-[2rem] flex items-center gap-6 shadow-xl shadow-indigo-500/10">
                                <div>
                                    <p className="text-[10px] font-black text-indigo-400 uppercase mb-1 tracking-widest">Balance Total</p>
                                    <h2 className="text-3xl font-black text-white tracking-tight">
                                        <span className="text-indigo-400 text-xl font-medium mr-1">$</span>
                                        {totalValue.toLocaleString('en-US', { minimumFractionDigits: 2 })}
                                    </h2>
                                </div>
                                <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-500 p-3 rounded-2xl shadow-lg shadow-indigo-600/40 transition-transform active:scale-95">
                                    <Icon name="plus" size={24} className="text-white" />
                                </button>
                            </div>
                        </header>

                        {view === 'portfolio' && (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {featuredIds.map(id => {
                                        const crypto = cryptos.find(c => c.id === id);
                                        if (!crypto) return null;
                                        return (
                                            <div key={crypto.id} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-indigo-500/40 transition-all shadow-lg group">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="flex items-center gap-3">
                                                        <CryptoLogo src={crypto.image} symbol={crypto.symbol} className="w-10 h-10 rounded-xl" />
                                                        <div><h3 className="font-bold text-sm text-white">{crypto.name}</h3><p className="text-[10px] text-slate-500 uppercase font-black">{crypto.symbol}</p></div>
                                                    </div>
                                                    <div className={`text-[11px] font-bold px-2 py-1 rounded-lg ${crypto.change >= 0 ? 'text-emerald-400 bg-emerald-500/10' : 'text-rose-400 bg-rose-500/10'}`}>{crypto.change?.toFixed(2)}%</div>
                                                </div>
                                                <div className="text-4xl font-black mb-4 tracking-tighter text-white">${formatCurrency(crypto.price)}</div>
                                                <MiniLineChart data={crypto.history} color={crypto.change >= 0 ? '#10b981' : '#f43f5e'} />
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="bg-slate-900/50 border border-slate-800 rounded-[3rem] p-8 shadow-2xl overflow-hidden">
                                    <h2 className="text-xl font-bold mb-8 flex items-center gap-3 text-white"><Icon name="list" className="text-indigo-500" /> Detalle de Tenencias</h2>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="text-slate-500 text-[10px] uppercase border-b border-slate-800/50 tracking-widest font-black">
                                                    <th className="pb-5">Activo</th>
                                                    <th className="pb-5 text-right px-4">Balance</th>
                                                    <th className="pb-5 text-center px-4">Progreso</th>
                                                    <th className="pb-5 text-right px-4">Meta</th>
                                                    <th className="pb-5 text-right">Equivalente USD</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800/30">
                                                {tableOrderIds.map(id => {
                                                    const crypto = cryptos.find(c => c.id === id);
                                                    if (!crypto) return null;
                                                    const amount = parseFloat(holdings[crypto.id]) || 0;
                                                    const meta = goals[crypto.id] || 0;
                                                    const progress = meta > 0 ? Math.min((amount / meta) * 100, 100) : 0;
                                                    return (
                                                        <tr key={crypto.id} className="group hover:bg-indigo-600/5 transition-colors">
                                                            <td className="py-5"><div className="flex items-center gap-4"><CryptoLogo src={crypto.image} symbol={crypto.symbol} /><div><p className="font-bold text-sm text-white">{crypto.name}</p><p className="text-[10px] text-slate-500 uppercase font-black">{crypto.symbol}</p></div></div></td>
                                                            <td className="py-5 text-right px-4 font-black text-sm text-indigo-200">
                                                                {amount.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 6 })}
                                                            </td>
                                                            <td className="py-5 px-6 min-w-[200px]">{meta > 0 ? <div className="w-full h-2 progress-bar-bg rounded-full overflow-hidden border border-slate-800"><div className="h-full bg-indigo-600" style={{ width: `${progress}%` }}></div></div> : <div className="text-center text-[9px] font-bold text-slate-800 tracking-widest">---</div>}</td>
                                                            <td className="py-5 text-right px-4 font-black text-sm text-slate-400">{meta || '-'}</td>
                                                            <td className="py-5 text-right font-black text-white text-base">
                                                                ${(amount * crypto.price).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'chart' && (
                            <div className="bg-slate-900/50 border border-slate-800 rounded-[3rem] p-10 md:p-14 shadow-2xl">
                                <h2 className="text-3xl font-black italic uppercase tracking-tighter mb-14 flex items-center gap-5 text-white"><Icon name="bar-chart-3" className="text-indigo-500" size={36} /> Distribución de Activos</h2>
                                <DistributionChart data={chartData} />
                            </div>
                        )}

                        {view === 'lps' && (
                            <div className="space-y-12">
                                <section>
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter mb-8 flex items-center gap-4 text-white">
                                        <Icon name="shield-check" className="text-indigo-400" size={24} /> LP's de Stables
                                    </h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {lps.stables.map(lp => (
                                            <LpCard key={lp.id} lp={lp} onUpdate={(id, f, v) => updateLp('stables', id, f, v)} />
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter mb-8 flex items-center gap-4 text-white">
                                        <Icon name="zap" className="text-amber-400" size={24} /> LP's de Flujo
                                    </h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {lps.flujo.map(lp => (
                                            <LpCard key={lp.id} lp={lp} onUpdate={(id, f, v) => updateLp('flujo', id, f, v)} />
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter mb-8 flex items-center gap-4 text-white">
                                        <Icon name="archive" className="text-blue-400" size={24} /> LP's de Reserva
                                    </h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {lps.reserva.map(lp => (
                                            <LpCard key={lp.id} lp={lp} onUpdate={(id, f, v) => updateLp('reserva', id, f, v)} />
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'performance' && (
                            <div className="space-y-10">
                                <div className="bg-slate-900/50 border border-slate-800 rounded-[3rem] p-8 shadow-2xl">
                                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-12">
                                        <div>
                                            <h2 className="text-2xl font-black italic uppercase tracking-tighter flex items-center gap-3 text-white">
                                                <Icon name="trending-up" className="text-indigo-500" /> Evolución de Tenencias
                                            </h2>
                                            <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">Control semanal (7, 14, 21, Fin de mes)</p>
                                        </div>
                                        <form className="flex flex-wrap gap-4 w-full lg:w-auto" onSubmit={(e) => {
                                            e.preventDefault();
                                            const date = e.target.date.value;
                                            const val = e.target.value.value;
                                            if (date && val) {
                                                addPerformanceRecord(date, val);
                                                e.target.reset();
                                            }
                                        }}>
                                            <input name="date" type="date" className="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-sm focus:border-indigo-500 focus:outline-none" required />
                                            <input name="value" type="number" step="any" placeholder="Balance Total USD" className="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-sm focus:border-indigo-500 focus:outline-none flex-1" required />
                                            <button type="submit" className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl font-bold transition-colors">Registrar</button>
                                        </form>
                                    </div>

                                    {performanceData.length === 0 ? (
                                        <div className="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-[2rem] text-slate-600">
                                            <Icon name="bar-chart" size={48} className="mb-4 opacity-20" />
                                            <p className="font-bold uppercase tracking-widest text-xs italic">Ingresa un registro para ver la evolución</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-10">
                                            <div className="h-[450px] flex items-end gap-2 md:gap-4 px-4 border-b border-slate-800 pb-2 overflow-x-auto custom-scroll pt-12">
                                                {performanceData.map((item, idx) => {
                                                    const maxVal = Math.max(...performanceData.map(p => p.value)) || 1;
                                                    const height = (item.value / maxVal) * 80; 
                                                    const prev = performanceData[idx-1];
                                                    const diff = prev ? ((item.value - prev.value) / prev.value) * 100 : 0;
                                                    
                                                    return (
                                                        <div key={idx} className="flex-1 min-w-[100px] flex flex-col items-center group relative h-full justify-end">
                                                            <div className="mb-2 text-[11px] font-black text-indigo-200 tracking-tighter text-center">
                                                                ${item.value.toLocaleString(undefined, { maximumFractionDigits: 0 })}
                                                            </div>
                                                            <div className="w-full bg-indigo-600/80 group-hover:bg-indigo-500 rounded-t-xl transition-all relative overflow-hidden shadow-lg shadow-indigo-600/20" style={{ height: `${height}%` }}>
                                                                <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                                                            </div>
                                                            <div className="mt-4 text-center">
                                                                <p className="text-[10px] font-black text-white uppercase tracking-tighter">
                                                                    {new Date(item.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' })}
                                                                </p>
                                                                {prev && (
                                                                    <p className={`text-[10px] font-black mt-1 ${diff >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                                        {diff >= 0 ? '↑' : '↓'} {Math.abs(diff).toFixed(1)}%
                                                                    </p>
                                                                )}
                                                                <button onClick={() => removePerformanceRecord(idx)} className="opacity-0 group-hover:opacity-100 mt-2 text-slate-600 hover:text-rose-500 transition-all">
                                                                    <Icon name="trash-2" size={12} />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                <div className="bg-slate-950/50 p-6 rounded-[2rem] border border-slate-800/50">
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Mejor Registro</p>
                                                    <p className="text-xl font-black text-emerald-400">${Math.max(...performanceData.map(p => p.value)).toLocaleString()}</p>
                                                </div>
                                                <div className="bg-slate-950/50 p-6 rounded-[2rem] border border-slate-800/50">
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Promedio Histórico</p>
                                                    <p className="text-xl font-black text-white">${(performanceData.reduce((a,b) => a + b.value, 0) / performanceData.length).toLocaleString(undefined, {maximumFractionDigits: 0})}</p>
                                                </div>
                                                <div className="bg-slate-950/50 p-6 rounded-[2rem] border border-slate-800/50">
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Último Cambio</p>
                                                    {performanceData.length > 1 ? (() => {
                                                        const last = performanceData[performanceData.length - 1];
                                                        const prev = performanceData[performanceData.length - 2];
                                                        const diff = ((last.value - prev.value) / prev.value) * 100;
                                                        return <p className={`text-xl font-black ${diff >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{diff >= 0 ? '+' : ''}{diff.toFixed(2)}%</p>;
                                                    })() : <p className="text-xl font-black text-slate-700">---</p>}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-[3.5rem] p-10 shadow-2xl modal-enter">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter text-white">Gestionar Criptos</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="hover:rotate-90 transition-transform p-2 bg-slate-800 rounded-full text-white"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-3 custom-scroll">
                                    {cryptos.sort((a,b) => a.id.localeCompare(b.id)).map(crypto => (
                                        <div key={crypto.id} className="bg-slate-800/20 p-5 rounded-[2rem] border border-slate-700/30">
                                            <div className="flex items-center gap-3 mb-3">
                                                <CryptoLogo src={crypto.image} symbol={crypto.symbol} className="w-6 h-6 rounded-lg" />
                                                <span className="font-bold text-white uppercase text-xs tracking-widest">{crypto.name}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" step="any" value={holdings[crypto.id] === '0' ? '' : holdings[crypto.id]} onChange={(e) => setHoldings(p => ({ ...p, [crypto.id]: e.target.value }))} className="bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2 text-white font-bold text-sm focus:outline-none focus:border-indigo-500" placeholder="Balance..." />
                                                <input type="number" value={goals[crypto.id] || ''} onChange={(e) => setGoals(p => ({ ...p, [crypto.id]: parseFloat(e.target.value) || 0 }))} className="bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2 text-indigo-400 font-bold text-sm focus:outline-none focus:border-indigo-500" placeholder="Meta..." />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setIsModalOpen(false)} className="w-full mt-8 bg-indigo-600 py-5 rounded-[1.5rem] font-black uppercase text-white hover:bg-indigo-500 transition-colors">Guardar y Cerrar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
